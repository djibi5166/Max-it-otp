<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <title>Max-it OTP</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div id="splash-screen">
        <div class="loader-container">
            <div class="logo-circle">M</div>
            <div class="pulse"></div>
        </div>
        <p class="loading-text">Sécurisation en cours...</p>
    </div>

    <div class="app-container">
        <header>
            <div class="status-bar"></div>
            <h1>Max-it <span class="badge">OTP</span></h1>
        </header>

        <main>
            <div class="card">
                <div class="lock-icon">🔒</div>
                <h2>Vérification</h2>
                <p>Veuillez saisir le code à 6 chiffres</p>
                
                <div class="input-group">
                    <input type="number" id="otp-input" placeholder="000000" maxlength="6">
                </div>

                <button id="btn-verify" onclick="handleVerify()">
                    VÉRIFIER LE CODE
                </button>
                
                <a href="#" class="resend-link">Renvoyer le SMS</a>
            </div>

            <div class="footer-info">
                <p>Protégé par cryptage de bout en bout</p>
            </div>
        </main>
    </div>

    <script src="cordova.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
