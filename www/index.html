<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max+ Music</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <span id="status-time">00:00</span>
            <div id="loader-status">Prêt</div>
        </div>

        <div class="player-ui">
            <div class="album-art" id="album-disk">
                <img src="img/logo.png" alt="Disk">
            </div>
            
            <h2 id="song-title">Sélectionnez un titre</h2>
            <p id="song-artist">Local Storage</p>

            <div class="progress-container">
                <div class="progress-bar">
                    <div id="progress-fill"></div>
                </div>
                <div class="time-stamps">
                    <span id="current-time">0:00</span>
                    <span id="total-time">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button id="btn-prev" class="btn-neo">⏮</button>
                <button id="btn-play-pause" class="btn-neo main">
                    <span id="play-icon">▶</span>
                    <span id="pause-icon" style="display:none;">||</span>
                </button>
                <button id="btn-next" class="btn-neo">⏭</button>
            </div>
        </div>
    </div>
    <script src="js/index.js" type="module"></script>
</body>
</html>
