<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>MaxIT OTP</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <img src="img/icon.png" class="logo" alt="icon">
      <h1>MaxIT OTP</h1>
      <p class="subtitle">Envoyer OTP — Orange style • App générée pour Web2APK</p>
    </header>

    <main>
      <input type="text" 
       autocomplete="one-time-code" 
       id="otp-input" 
       placeholder="Code de vérification">
       
      <label>Numéro principal (8 chiffres)</label>
      <input id="numInput" placeholder="Ex: 65000001" inputmode="numeric" />

      <label>Envoyer aussi à (un par ligne) — SIMs secondaires (optionnel)</label>
      <textarea id="secondary" placeholder="65xxxxxx&#10;66xxxxxx"></textarea>

      <div class="row">
        <button id="sendBtn">Envoyer OTP</button>
        <button id="downloadHistory">Exporter historique</button>
      </div>

      <label>Options</label>
      <div class="options">
        <label><input type="checkbox" id="notifyOpt" checked /> Notifications</label>
        <label><input type="checkbox" id="saveFileOpt" checked /> Sauvegarder historique local (localStorage)</label>
      </div>

      <label>Logs</label>
      <pre id="log" class="log"></pre>
    </main>

    <footer>
      <small>Utilise uniquement tes numéros. Respecte les conditions d'utilisation de l'API.</small>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
