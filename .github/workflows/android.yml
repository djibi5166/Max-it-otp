name: Android Build Cloud

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      # On crée le fichier à la racine ET on définit une variable d'environnement
      - name: Create google-services.json
        run: echo '${{secrets.GOOGLE_SERVICES_JSON}}' > google-services.json

      - name: Add Android Platform
        run: cordova platform add android

      # Cette étape place le fichier partout où Gradle pourrait le chercher
      - name: Prepare Firebase Folders
        run: |
          mkdir -p platforms/android/app/src/debug/
          mkdir -p platforms/android/app/src/release/
          cp google-services.json platforms/android/app/
          cp google-services.json platforms/android/app/src/debug/
          cp google-services.json platforms/android/app/src/release/

      - name: Build APK (Debug)
        run: cordova build android --debug
        env:
          GOOGLE_SERVICES_JSON_CONTENT: ${{secrets.GOOGLE_SERVICES_JSON}}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Max-it-OTP-APK
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
