name: Android Build Cloud

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Add Android Platform
        run: cordova platform add android

      # Cette méthode garantit qu'aucun caractère spécial ne casse le JSON
      - name: Create google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > google-services.json
          # On vérifie si le fichier commence par une apostrophe parasite et on la retire
          sed -i "s/^'//;s/'$//" google-services.json

      - name: Finalize Firebase Config
        run: |
          mkdir -p platforms/android/app/src/debug/
          cp google-services.json platforms/android/app/
          cp google-services.json platforms/android/app/src/debug/

      - name: Build APK (Debug)
        run: cordova build android --debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Max-it-OTP-APK
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
