name: Android Build Cloud
on:
  push:
    branches: [ main, master ] # Se lance quand tu pousses du code sur main ou master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup NodeJS
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Add Android Platform
        run: cordova platform add android

      - name: Build APK (Release)
        run: cordova build android --release --verbose

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MaxIt-OTP-APK
          # On utilise un "wildcard" (**) pour que GitHub cherche partout dans le dossier build
          path: platforms/android/app/build/outputs/apk/**/*.apk

