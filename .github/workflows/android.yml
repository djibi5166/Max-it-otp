name: Android Build Cloud

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      # MÉTHODE DE SÉCURITÉ : cat <<EOF écrit le JSON brut sans le modifier
      - name: Create google-services.json
        run: |
          cat <<EOF > google-services.json
          ${{secrets.GOOGLE_SERVICES_JSON}}
          EOF

      - name: Add Android Platform
        run: cordova platform add android

      # On force le placement du fichier là où Gradle l'attend spécifiquement
      - name: Prepare Firebase Folders
        run: |
          mkdir -p platforms/android/app/
          mkdir -p platforms/android/app/src/debug/
          cp google-services.json platforms/android/app/
          cp google-services.json platforms/android/app/src/debug/

      - name: Build APK (Debug)
        run: cordova build android --debug --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Max-it-OTP-APK
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
