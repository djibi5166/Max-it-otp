name: Android Build Cloud

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Add Android Platform
        run: cordova platform add android --nosave || echo "Already exists"

      # Utilisation de Python pour un décodage parfait sans pollution de caractères
      - name: Create google-services.json (Safe Method)
        shell: python
        run: |
          import base64
          import os
          
          # On récupère le secret directement depuis l'environnement
          encoded = """${{ secrets.GOOGLE_SERVICES_JSON }}""".strip()
          decoded = base64.b64decode(encoded)
          
          with open("google-services.json", "wb") as f:
              f.write(decoded)

      - name: Finalize Firebase Config
        run: |
          mkdir -p platforms/android/app/src/debug/
          cp google-services.json platforms/android/app/
          cp google-services.json platforms/android/app/src/debug/
          # Vérification de la validité du fichier (doit afficher le début du JSON)
          head -n 5 google-services.json

      - name: Build APK (Debug)
        run: cordova build android --debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Max-it-OTP-APK
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
