name: Android Build Cloud

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      # On crée le fichier SECRET d'abord
      - name: Create google-services.json from Secret
        run: echo '${{secrets.GOOGLE_SERVICES_JSON}}' > google-services.json

      # On ajoute la plateforme et on laisse Cordova créer les dossiers
      - name: Add Android Platform
        run: cordova platform add android

      # On place le fichier EXACTEMENT là où le plugin Firebase le veut
      - name: Finalize Firebase Config
        run: |
          mkdir -p platforms/android/app/
          cp google-services.json platforms/android/app/
          cp google-services.json platforms/android/

      - name: Build APK (Debug)
        run: cordova build android --debug --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Max-it-OTP-APK
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
