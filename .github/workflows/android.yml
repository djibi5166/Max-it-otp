name: Android Build Cloud

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Add Android Platform
        run: cordova platform add android

      - name: Create google-services.json
        run: |
          # 1. Création à la racine
          echo '${{secrets.GOOGLE_SERVICES_JSON}}' > google-services.json
          # 2. Copie forcée dans le dossier Android (le secret de la réussite)
          mkdir -p platforms/android/app/
          cp google-services.json platforms/android/app/
          cp google-services.json platforms/android/

      - name: Build APK (Debug)
        run: cordova build android --debug --verbose

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Max-it-OTP-APK
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
